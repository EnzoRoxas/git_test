<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Review</title>
</head>
<body>
    <!--It is worth noting that we named our HTML file index. We should always name the HTML file that will contain the homepage of our website index.html. This is because web servers will by default look for an index.html page when users land on our websites – and not having one will cause big problems.-->
    <p>Let us review!</p>

    <p>Every other day <strong>I'm</strong> wondering...</p> <!--Strong for bold letters-->

    <p><em>What's a human being gotta be like?</em></p> <!--Em for italic-->


<!--LISTS-->
    <ul> <!--Begins with bullet pt-->
        <li>Moonshine</li>
        <li>Beer</li>
    </ul>

    <ol> <!--begins with a number-->
        <li>Cheese</li>
        <li>Milk</li>
    </ol>
    
</body>
</html>
